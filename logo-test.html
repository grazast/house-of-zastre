<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background: #f8f7f4; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: monospace; gap: 32px; }
  svg { display: block; }
  .controls { display: flex; flex-direction: column; gap: 12px; width: 340px; }
  label { display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
  input[type=range] { width: 200px; }
  .val { width: 40px; text-align: right; }
  hr { border: none; border-top: 1px solid #ccc; margin: 8px 0; }
  button { padding: 4px 12px; font-size: 12px; cursor: pointer; }
</style>
</head>
<body>

<svg id="logo" viewBox="0 0 200 200" width="220" height="220" xmlns="http://www.w3.org/2000/svg">
  <rect width="200" height="200" fill="#404040"/>
  <path id="z-border-test" d="M10,10 L190,10 L190,190 L10,190 Z" fill="none" stroke="#f8f7f4" stroke-width="7" stroke-dasharray="0 720"/>
  <line id="topBar" x1="46" y1="57" x2="154" y2="57" stroke="#f8f7f4" stroke-linecap="butt"/>
  <line id="diagonal" x1="154" y1="61" x2="46" y2="141" stroke="#f8f7f4" stroke-linecap="butt"/>
  <line id="crossbar" x1="80" y1="101" x2="120" y2="101" stroke="#f8f7f4" stroke-linecap="butt"/>
  <line id="bottomBar" x1="46" y1="145" x2="154" y2="145" stroke="#f8f7f4" stroke-linecap="butt"/>
</svg>

<div class="controls">
  <label>Stroke width <span class="val" id="swVal">16</span>
    <input type="range" id="sw" min="8" max="30" value="16">
  </label>
  <label>Diagonal top Y <span class="val" id="dyTopVal">61</span>
    <input type="range" id="dyTop" min="49" max="75" value="61">
  </label>
  <label>Diagonal bottom Y <span class="val" id="dyBotVal">141</span>
    <input type="range" id="dyBot" min="125" max="153" value="141">
  </label>
  <label>Crossbar width <span class="val" id="cwVal">40</span>
    <input type="range" id="cw" min="20" max="80" value="40">
  </label>
  <label>Line ends
    <select id="linecap">
      <option value="butt">Flat (butt)</option>
      <option value="square">Right angle (square)</option>
      <option value="round">Round</option>
    </select>
  </label>

  <hr>
  <label>Overdraw amount <span class="val" id="overdrawVal">0</span>
    <input type="range" id="overdraw" min="0" max="200" value="0">
  </label>
  <label>Overdraw at % <span class="val" id="overdrawPctVal">80</span>
    <input type="range" id="overdrawPct" min="50" max="95" value="80">
  </label>
  <label style="justify-content:flex-end; gap:8px;">
    <button onclick="replayBorder()">Replay border</button>
  </label>
  <div id="output" style="font-size:11px;color:#888;margin-top:4px;"></div>
</div>

<script>
  function replayBorder() {
    const overdraw = +document.getElementById('overdraw').value;
    const pct = +document.getElementById('overdrawPct').value;

    const el = document.getElementById('z-border-test');
    el.style.animation = 'none';
    el.style.strokeDasharray = '720';
    el.style.strokeDashoffset = '720';
    el.getBoundingClientRect(); // force reflow

    el.animate([
      { strokeDasharray: '0 720',             offset: 0 },
      { strokeDasharray: `${720 + overdraw} 720`, offset: pct / 100 },
      { strokeDasharray: '720 720',           offset: 1 }
    ], { duration: overdraw === 0 ? 900 : 1100, delay: 100, easing: 'cubic-bezier(0.42,0,0.58,1)', fill: 'forwards' });

    document.getElementById('output').textContent =
      `overdraw: -${overdraw}  at: ${pct}%`;
  }

  function update() {
    const sw = document.getElementById('sw').value;
    const dyTop = document.getElementById('dyTop').value;
    const dyBot = document.getElementById('dyBot').value;
    const cw = document.getElementById('cw').value;
    const cbCenter = 100;
    const cbLeft = cbCenter - cw/2;
    const cbRight = cbCenter + +cw/2;

    document.getElementById('swVal').textContent = sw;
    document.getElementById('dyTopVal').textContent = dyTop;
    document.getElementById('dyBotVal').textContent = dyBot;
    document.getElementById('cwVal').textContent = cw;

    const cap = document.getElementById('linecap').value;
    document.querySelectorAll('line').forEach(l => {
      l.setAttribute('stroke-width', sw);
      l.setAttribute('stroke-linecap', 'square');
    });
    document.getElementById('diagonal').setAttribute('stroke-linecap', cap);
    document.getElementById('diagonal').setAttribute('y1', dyTop);
    document.getElementById('diagonal').setAttribute('y2', dyBot);
    document.getElementById('crossbar').setAttribute('x1', cbLeft);
    document.getElementById('crossbar').setAttribute('x2', cbRight);
  }

  document.getElementById('overdraw').addEventListener('input', function() {
    document.getElementById('overdrawVal').textContent = this.value;
    replayBorder();
  });
  document.getElementById('overdrawPct').addEventListener('input', function() {
    document.getElementById('overdrawPctVal').textContent = this.value;
    replayBorder();
  });

  document.querySelectorAll('input[type=range]:not(#overdraw):not(#overdrawPct), select').forEach(i => i.addEventListener('input', update));
  update();
  replayBorder();
</script>
</body>
</html>
