<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House of Zastre</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #404040;
    --secondary: #6b6b6b;
    --accent: #dbc278;
    --bg: #f8f7f4;
    --font: 'IBM Plex Sans', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    overflow: hidden;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--primary);
    overflow-y: scroll;
    overflow-x: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
    height: 100vh;
  }

  body::-webkit-scrollbar {
    display: none;
  }

  /* ─── LOADER ─── */
  #loader {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    animation: loaderFade 4.5s ease-in-out forwards;
  }

  @keyframes loaderFade {
    0% { opacity: 1; }
    75% { opacity: 1; }
    100% { opacity: 0; pointer-events: none; }
  }

  /* ─── SECTIONS ─── */
  section {
    height: 100vh;
  }

  /* ─── HERO ─── */
  #hero {
    display: flex;
    opacity: 0;
    animation: pageReveal 1s ease-out 4s forwards;
  }

  @keyframes pageReveal {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }

  .hero-left {
    width: 50%;
    height: 100vh;
    position: relative;
    overflow: hidden;
    background: var(--primary);
    flex-shrink: 0;
  }

  .hero-left video {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: right center;
    opacity: 0.85;
  }

  .hero-right {
    width: 50%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 80px;
    background: var(--primary);
    position: relative;
  }

  .hero-right h1 {
    font-size: 52px;
    font-weight: 300;
    letter-spacing: -1px;
    line-height: 1.1;
    color: #f8f7f4;
    margin-bottom: 24px;
  }

  .hero-right h1 span {
    display: block;
    color: var(--accent);
    font-weight: 500;
  }

  .hero-right .tagline {
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #a0a0a0;
  }

  .scroll-arrow {
    position: absolute;
    bottom: 40px;
    left: 80px;
    width: 20px;
    height: 20px;
    border-right: 1.5px solid rgba(255,255,255,0.5);
    border-bottom: 1.5px solid rgba(255,255,255,0.5);
    transform: rotate(45deg);
    animation: bounceDown 2s ease-in-out infinite;
    cursor: pointer;
  }

  @keyframes bounceDown {
    0%, 100% { transform: rotate(45deg) translateY(0); }
    50% { transform: rotate(45deg) translateY(6px); }
  }

  /* ─── SCROLL FADE-IN ─── */
  .fade-in {
    opacity: 0;
    transform: translateY(20px);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }

  .fade-in.visible {
    opacity: 1;
    transform: translateY(0);
  }

  /* ─── ABOUT ─── */
  #about {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 120px 80px;
    position: relative;
    overflow: hidden;
  }

  #about video {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    filter: saturate(0.2) brightness(0.4);
    opacity: 0.6;
    z-index: 0;
  }

  #about > * {
    position: relative;
    z-index: 1;
  }

  .about-label {
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 32px;
  }

  #about h2 {
    font-size: 48px;
    font-weight: 300;
    color: #f8f7f4;
    text-align: center;
    line-height: 1.2;
    max-width: 700px;
  }

  #about h2 em {
    font-style: italic;
    color: var(--accent);
    font-weight: 400;
  }

  .divider {
    width: 60px;
    height: 1.5px;
    background: var(--accent);
    margin: 48px 0;
  }

  .about-body {
    max-width: 560px;
    text-align: center;
    font-size: 16px;
    line-height: 1.8;
    color: #f8f7f4;
    font-weight: 300;
  }

  /* ─── INQUIRY ─── */
  #inquiry {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 60px 80px 240px;
    position: relative;
    overflow: hidden;
  }

  #inquiry h3 {
    font-size: 14px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 48px;
  }

  .inquiry-form {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .inquiry-form input,
  .inquiry-form textarea {
    width: 100%;
    padding: 16px 0;
    border: none;
    border-bottom: 1px solid #d4d0c8;
    background: transparent;
    font-family: var(--font);
    font-size: 15px;
    font-weight: 300;
    color: var(--primary);
    outline: none;
    transition: border-color 0.3s;
    resize: none;
  }

  .inquiry-form input::placeholder,
  .inquiry-form textarea::placeholder {
    color: #b5b0a5;
    letter-spacing: 1px;
  }

  .inquiry-form input:focus,
  .inquiry-form textarea:focus {
    border-bottom-color: var(--accent);
  }

  .inquiry-form button {
    align-self: flex-start;
    padding: 14px 40px;
    border: 1px solid var(--primary);
    background: transparent;
    font-family: var(--font);
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--primary);
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 16px;
  }

  .inquiry-form button:hover {
    background: var(--primary);
    color: var(--bg);
  }

  .form-success {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 15px;
    color: var(--secondary);
    font-weight: 300;
    letter-spacing: 1px;
  }

  /* ─── FOOTER STRIP ─── */
  .footer-strip {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 200px;
    overflow: hidden;
    background: #111;
  }

  .footer-strip video {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.7;
  }

  .footer-strip::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 60%;
    background: linear-gradient(to bottom, #f8f7f4, transparent);
    z-index: 1;
    pointer-events: none;
  }

  .footer-overlay {
    position: absolute;
    bottom: 24px;
    left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 80px;
    z-index: 2;
  }

  .footer-mark {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--primary);
    font-weight: 600;
    white-space: nowrap;
  }

  .footer-links a {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--primary);
    font-weight: 600;
    text-decoration: none;
    transition: color 0.3s;
  }

  .footer-links a:hover {
    color: var(--accent);
  }

  /* ─── ADMIN LINK ─── */
  .admin-link {
    position: fixed;
    top: 32px;
    right: 40px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #c0bbb4;
    text-decoration: none;
    z-index: 100;
    transition: color 0.3s;
  }

  .admin-link:hover {
    color: var(--accent);
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    .hero-right { padding: 48px 32px; }
    .hero-right h1 { font-size: 36px; }
    #about { padding: 80px 32px; }
    #about h2 { font-size: 32px; }
    #inquiry { padding: 48px 32px 200px; }
    .inquiry-form { gap: 10px; }
    .inquiry-form input, .inquiry-form textarea { padding: 10px 0; font-size: 13px; }
    .inquiry-form button { margin-top: 8px; padding: 12px 32px; }
    footer { padding: 32px; flex-direction: column; gap: 16px; }
  }
</style>
</head>
<body>

<a href="/admin.html" class="admin-link">Admin</a>

<!-- LOADER -->
<div id="loader">
  <svg viewBox="0 0 200 200" width="140" height="140" xmlns="http://www.w3.org/2000/svg">
    <style>
      @keyframes draw-line { to { stroke-dashoffset: 0; } }
      @keyframes wipe-x    { to { transform: scaleX(0); } }
      @keyframes wipe-y    { to { transform: scaleY(0); } }

      #cover-top    { transform-origin: 194px 10px;  animation: wipe-x 0.32s ease-in 0.10s forwards; }
      #cover-right  { transform-origin: 190px 186px; animation: wipe-y 0.32s ease-in 0.38s forwards; }
      #cover-bottom { transform-origin: 6px   190px; animation: wipe-x 0.32s ease-in 0.66s forwards; }
      #cover-left   { transform-origin: 10px  14px;  animation: wipe-y 0.32s ease-in 0.94s forwards; }
      #z-top     { stroke-dasharray: 108; stroke-dashoffset: 108; animation: draw-line 0.4s cubic-bezier(0.42,0,0.58,1) 1.3s forwards; }
      #z-diag    { stroke-dasharray: 148; stroke-dashoffset: 148; animation: draw-line 0.6s cubic-bezier(0.42,0,0.58,1) 1.7s forwards; }
      #z-bottom  { stroke-dasharray: 108; stroke-dashoffset: 108; animation: draw-line 0.4s cubic-bezier(0.42,0,0.58,1) 2.3s forwards; }
      #z-cross   { stroke-dasharray: 51;  stroke-dashoffset: 51;  animation: draw-line 0.25s linear 2.7s forwards; }
    </style>

    <rect width="200" height="200" fill="#404040"/>
    <path d="M10,10 L190,10 L190,190 L10,190 Z" fill="none" stroke="#f8f7f4" stroke-width="7"/>
    <rect id="cover-top"    x="6"   y="6"   width="188" height="8"   fill="#404040"/>
    <rect id="cover-right"  x="186" y="14"  width="8"   height="172" fill="#404040"/>
    <rect id="cover-bottom" x="6"   y="186" width="188" height="8"   fill="#404040"/>
    <rect id="cover-left"   x="6"   y="14"  width="8"   height="172" fill="#404040"/>
    <line id="z-top"    x1="46"   y1="57"  x2="154"   y2="57"  stroke="#f8f7f4" stroke-width="15" stroke-linecap="square"/>
    <line id="z-diag"   x1="154"  y1="61"  x2="46"    y2="141" stroke="#f8f7f4" stroke-width="15" stroke-linecap="round"/>
    <line id="z-bottom" x1="46"   y1="145" x2="154"   y2="145" stroke="#f8f7f4" stroke-width="15" stroke-linecap="square"/>
    <line id="z-cross"  x1="74.5" y1="101" x2="125.5" y2="101" stroke="#f8f7f4" stroke-width="15" stroke-linecap="square"/>
  </svg>
</div>

<!-- HERO -->
<section id="hero">
  <div class="hero-left">
    <video autoplay muted loop playsinline src="hero-video.mp4"></video>
  </div>
  <div class="hero-right">
    <h1>House of<br><span>Zastre.</span></h1>
    <div class="scroll-arrow" onclick="scrollToSection(1)"></div>
  </div>
</section>

<!-- ABOUT -->
<section id="about">
  <video autoplay muted loop playsinline src="about-video.mp4"></video>
  <p class="about-label fade-in">About</p>
  <h2 class="fade-in">Built on prairie roots.<br>Grounded on the <em>West Coast</em>.</h2>
  <div class="divider fade-in"></div>
  <p class="about-body fade-in">
    HoZ is based out of Vancouver, Canada.
  </p>
</section>

<!-- INQUIRY -->
<section id="inquiry">
  <h3 class="fade-in">Submit an inquiry</h3>
  <div style="position:relative; width:100%; max-width:480px;">
    <form class="inquiry-form" id="inquiryForm">
      <input type="text" name="name" placeholder="Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="text" name="subject" placeholder="Subject">
      <textarea name="message" rows="4" placeholder="Message" required></textarea>
      <button type="submit">Send</button>
    </form>
    <div class="form-success" id="formSuccess">
      Thank you. We'll be in touch.
    </div>
  </div>
  <div class="footer-strip">
    <video autoplay muted loop playsinline src="footer-video.mp4"></video>
    <div class="footer-overlay">
      <div class="footer-mark">&copy; 2026 House of Zastre</div>
      <div class="footer-links">
        <a href="mailto:hello@houseofzastre.com">Contact</a>
      </div>
    </div>
  </div>
</section>

<script>
  // Always start at top on load
  document.body.scrollTop = 0;

  // Controlled page snapping
  const sections = Array.from(document.querySelectorAll('section'));
  let current = 0;
  let animating = false;
  const DURATION = 1200; // ms — increase to slow down more

  function easeInOut(t) {
    return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
  }

  function scrollToSection(index) {
    if (animating || index < 0 || index >= sections.length) return;
    animating = true;
    const start = document.body.scrollTop;
    const end = sections[index].offsetTop;
    const startTime = performance.now();

    function animate(now) {
      const elapsed = now - startTime;
      const progress = Math.min(elapsed / DURATION, 1);
      document.body.scrollTop = start + (end - start) * easeInOut(progress);
      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        current = index;
        animating = false;
      }
    }
    requestAnimationFrame(animate);
  }

  document.body.addEventListener('wheel', (e) => {
    e.preventDefault();
    if (e.deltaY > 0) scrollToSection(current + 1);
    else scrollToSection(current - 1);
  }, { passive: false });

  // Touch support
  let touchStart = 0;
  document.body.addEventListener('touchstart', (e) => { touchStart = e.touches[0].clientY; });
  document.body.addEventListener('touchend', (e) => {
    const delta = touchStart - e.changedTouches[0].clientY;
    if (Math.abs(delta) > 50) {
      if (delta > 0) scrollToSection(current + 1);
      else scrollToSection(current - 1);
    }
  });

  // Fade-in on scroll
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry, i) => {
      if (entry.isIntersecting) {
        setTimeout(() => entry.target.classList.add('visible'), i * 120);
      }
    });
  }, { threshold: 0.2 });

  document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

  // Slow video to 60-second loop
  const heroVideo = document.querySelector('.hero-left video');
  heroVideo.playbackRate = 0.25;
  heroVideo.addEventListener('loadedmetadata', () => {
    heroVideo.playbackRate = 0.25;
  });

  // Remove loader after animation
  setTimeout(() => {
    document.getElementById('loader').style.display = 'none';
  }, 4700);

  // Form submission
  const API = 'https://hoz-api.grahamzastre.workers.dev';
  document.getElementById('inquiryForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const formData = new FormData(this);
    await fetch(`${API}/api/inquiry`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: formData.get('name'),
        email: formData.get('email'),
        subject: formData.get('subject'),
        message: formData.get('message')
      })
    });
    this.style.visibility = 'hidden';
    document.getElementById('formSuccess').style.display = 'flex';
  });
</script>
</body>
</html>
